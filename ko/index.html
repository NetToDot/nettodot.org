비영리 선언 프로젝트입니다.
</p>

<p>
이 프로젝트는 피드·플랫폼·알고리즘에 대한
무의식적 의존에서 벗어나,
사유하고 선택하며 창조하는
주권적 디지털 삶으로의 전환을 제안합니다.
</p>
